<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>殺せんせーAI - カメラテスト</title>
</head>
<body>
    <video id="video" autoplay playsinline style="width: 100%; border: 2px solid yellow;"></returns>

    <script>
        // カメラ映像を起動して表示する関数
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
            } catch (err) {
                console.error("カメラへのアクセスを許可してください: ", err);
                alert("カメラが見つかりません。権限を確認してください。");
            }
        }

        // ページ読み込み時にカメラを起動
        startCamera();
    </script>
</body>
</html>
